name: Update Cirrus Registration Data

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cirrus-registration-data
  cancel-in-progress: false

env:
  FAA_RELEASABLE_AIRCRAFT_URL: https://registry.faa.gov/database/ReleasableAircraft.zip

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch FAA data
        run: python scripts/fetch_faa.py

      - name: Parse FAA data
        run: python scripts/parse_faa.py

      - name: Fetch ASO listing summaries
        run: python scripts/scrape_aso_listings.py

      - name: Build used-market proxies
        run: python scripts/used_market.py

      - name: Build serial tracking
        run: python scripts/serial_tracking.py

      - name: Sample ADS-B activity
        run: python scripts/flight_activity.py

      - name: Build dashboard data
        run: python scripts/build_data.py

      - name: Commit updated data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gama_deliveries.csv data/cirrus_faa_parsed.json data/cirrus_registrations.json data/cirrus_registrations.csv data/cirrus_aircraft_snapshot.json data/serial_history.json data/serial_tracking.json data/flight_activity.json data/flight_activity_history.json data/used_market.json data/transfer_history.json data/listing_history.json data/listings_manual.csv data/listings_aso.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Cirrus FAA registration data"
            git push
          fi

      - name: Deploy dashboard to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: bash .github/scripts/deploy_cirrus_to_vps.sh
